# docker-compose.yml

services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: project_chiciko
        volumes:
            - ./:/var/www/html
            - project_storage:/var/www/html/storage
            - ./.env.docker:/var/www/html/.env
        networks:
            - appnet
        depends_on:
            - redis
            - mysql
        restart: unless-stopped
        environment:
            APP_ENV: docker
            APP_DEBUG: ${APP_DEBUG}
            DB_HOST: ${DB_HOST}
            DB_PORT: ${DB_PORT}
            DB_DATABASE: ${DB_DATABASE}
            DB_USERNAME: ${DB_USERNAME}
            DB_PASSWORD: ${DB_PASSWORD}
            CACHE_DRIVER: redis
            SESSION_DRIVER: redis
            CACHE_CONNECTION: cache
            SESSION_CONNECTION: session

    nginx:
        image: nginx:stable
        container_name: chiciko_nginx
        ports:
            - ${NGINX_PORT}
        volumes:
            - ./:/var/www/html
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        networks:
            - appnet
        depends_on:
            - app

    redis:
        image: redis:7
        container_name: chiciko_redis
        volumes:
            - redis_data:/data
        networks:
            - appnet
        command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes

    mysql:
        image: mysql:8.0
        container_name: chiciko_mysql
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
            MYSQL_USER: ${DB_USERNAME}
            MYSQL_PASSWORD: ${DB_PASSWORD}
        volumes:
            - mysql_data:/var/lib/mysql
        ports:
            - ${MYSQL_PORT}
        networks:
            - appnet

    phpmyadmin:
        image: phpmyadmin/phpmyadmin:latest
        container_name: chiciko_phpmyadmin
        ports:
            - ${PHPMYADMIN_PORT}
        environment:
            PMA_HOST: mysql
        depends_on:
            - mysql
        networks:
            - appnet

networks:
    appnet:
        driver: bridge

volumes:
    mysql_data:
    redis_data:
    project_storage:
